<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calc-ui">
        <div class="display-ui">
            <div class="expression"></div>
        </div>
        <div class="buttons-ui">
            <div class="rows function-row1">
                <button class="clear-all">AC</button>
                <button class="delete">DEL</button>
                <button class="operators">%</button>
                <button class="operators" >/</button>
            </div>
            <div class="rows num-row1">
                <button class="numbers">7</button>
                <button class="numbers">8</button>
                <button class="numbers">9</button>
                <button class="operators">*</button>
            </div>
            <div class="rows num-row2">
                <button class="numbers">4</button>
                <button class="numbers">5</button>
                <button class="numbers">6</button>
                <button class="operators">-</button>
            </div>
            <div class="rows num-row3">
                <button class="numbers">1</button>
                <button class="numbers">2</button>
                <button class="numbers">3</button>
                <button class="operators">+</button>
            </div>
            <div class="rows function-row2">
                <button class="negative-sign">+/-</button>
                <button class="numbers">0</button>
                <button class="numbers">.</button>
                <button class="result">=</button>
            </div>
        </div>
    </div>
</body>
</html>
